name: OTA Update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch (preview or production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message'
        required: false
        default: 'Manual OTA update'

concurrency:
  group: ota-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  update:
    name: Publish OTA Update
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        run: |
          BRANCH="${{ github.event.inputs.branch || 'preview' }}"
          MESSAGE="${{ github.event.inputs.message || github.event.head_commit.message || 'OTA update' }}"
          eas update --branch "$BRANCH" --message "$MESSAGE" --non-interactive
